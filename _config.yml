title: "LLM & Agent Research"
description: 追踪LLM、Agent前沿发展，沉淀个人专业知识，创作技术博客
url: "https://agent-2026-sophie.github.io"
baseurl: "/agent_sendiment"

theme: minima

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate

author:
  name: Sophie Wu
  email: sophie_promising@163.com
  github: agent-2026-sophie

header_pages:
  - index.md
  - llm.md
  - agent.md
  - evals.md
  - about.md

timezone: Asia/Shanghai

highlighter: rouge

collections:
  llm_posts:
    output: true
    permalink: /llm/:name/
  agent_posts:
    output: true
    permalink: /agent/:name/
  evals_posts:
    output: true
    permalink: /evals/:name/

defaults:
  - scope:
      path: ""
      type: llm_posts
    values:
      layout: post
      category: LLM
  - scope:
      path: ""
      type: agent_posts
    values:
      layout: post
      category: Agent
  - scope:
      path: ""
      type: evals_posts
    values:
      layout: post
      category: Evaluation
