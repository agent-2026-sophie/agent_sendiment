<footer class="footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-section">
        <h3>{{ site.title }}</h3>
        <p>{{ site.description }}</p>
      </div>
      
      <div class="footer-section">
        <h4>快速链接</h4>
        <ul>
          {% for page in site.header_pages %}
            {% assign p = site.pages | where: "path", page | first %}
            <li><a href="{{ p.url | relative_url }}">{{ p.title }}</a></li>
          {% endfor %}
        </ul>
      </div>
      
      <div class="footer-section">
        <h4>联系方式</h4>
        <ul>
          <li><a href="https://github.com/{{ site.author.github }}" target="_blank">GitHub</a></li>
          <li><a href="mailto:{{ site.author.email }}">Email</a></li>
        </ul>
      </div>
    </div>
    
    <div class="footer-bottom">
      <p>&copy; {{ site.time | date: "%Y" }} {{ site.author.name }}. All rights reserved.</p>
    </div>
  </div>
</footer>
