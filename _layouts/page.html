---
layout: default
---

<div class="container site-layout">
  <button class="sidebar-toggle" type="button" aria-expanded="true">收起目录</button>
  {% include sidebar.html %}

  <main class="content-column">
    <section class="page-intro">
      <h1>{{ page.heading | default: page.title }}</h1>
      {% if page.description %}
        <p>{{ page.description }}</p>
      {% endif %}
    </section>

    <article class="page-content">
      {{ content }}
    </article>
  </main>
</div>
